name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_PROVIDER: postgresql
          DATABASE_URL: postgresql://user:pass@localhost:5432/tatomir

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_PROVIDER: postgresql
          DATABASE_URL: postgresql://user:pass@localhost:5432/tatomir

      - name: Build
        run: npm run build
        env:
          DATABASE_PROVIDER: postgresql
          DATABASE_URL: postgresql://user:pass@localhost:5432/tatomir
          NEXTAUTH_SECRET: ci-secret-not-real
          NEXTAUTH_URL: http://localhost:3000
