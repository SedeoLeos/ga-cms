services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://tatomir:${POSTGRES_PASSWORD:-tatomir}@db:5432/tatomir
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tatomir
      POSTGRES_USER: tatomir
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tatomir}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tatomir -d tatomir"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Optional: Redis for distributed cache across multiple app instances
  # Enable by setting REDIS_URL=redis://cache:6379 in your .env
  # cache:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redisdata:/data
  #   restart: unless-stopped

volumes:
  pgdata:
  # redisdata:
